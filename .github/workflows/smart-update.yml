name: Smart Blocklist Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode update'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - pattern
          - nrd
          - crawl

permissions:
  contents: write

jobs:
  smart-update:
    name: Smart Blocklist Update
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get install -y curl gawk bzip2
          pip install requests tldextract 2>/dev/null || true
          chmod +x scripts/smart-blocklist.sh
          chmod +x scripts/update.sh

      - name: Update blocklist utama
        run: bash scripts/update.sh

      - name: Jalankan Smart Blocklist
        run: |
          MODE="${{ inputs.mode || 'full' }}"
          case "$MODE" in
            pattern) bash scripts/smart-blocklist.sh --pattern ;;
            nrd)     bash scripts/smart-blocklist.sh --nrd ;;
            crawl)   bash scripts/smart-blocklist.sh --crawl ;;
            *)       bash scripts/smart-blocklist.sh ;;
          esac

      - name: Gabungkan semua blocklist
        run: |
          MAIN="domain/blocklist.txt"
          SMART="domain/smart-blocklist.txt"
          MERGED="domain/merged-final.txt"

          {
            echo "# MalamPutih DNS — Final Merged Blocklist"
            echo "# Dibuat: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            cat "$MAIN" "$SMART" 2>/dev/null \
              | grep -v '^#' \
              | grep -v '^[[:space:]]*$' \
              | tr '[:upper:]' '[:lower:]' \
              | sort -u
          } > "$MERGED"

          TOTAL=$(grep -c '^[a-z]' "$MERGED" 2>/dev/null || echo 0)
          echo "Total merged: $TOTAL domain"
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV

      - name: Update stats.json
        run: |
          python3 << 'PYEOF'
          import json, os
          from datetime import datetime, timezone
          total = int(os.environ.get('TOTAL', 0))
          try:
              with open('stats.json', 'r') as f:
                  d = json.load(f)
          except:
              d = {}
          d['total_merged'] = total
          d['merged_updated'] = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          with open('stats.json', 'w') as f:
              json.dump(d, f, indent=2)
          print(f'stats.json updated: {total} domain')
          PYEOF

      - name: Commit dan Push
        run: |
          git config user.name "MalamPutih DNS Bot"
          git config user.email "bot@dns.purnomoadi.web.id"
          git add domain/ stats.json
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan."
          else
            git commit -m "Smart update — ${TOTAL} domain ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
            echo "Push berhasil!"
          fi

      - name: Trigger Technitium Update
        if: always()
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          curl -sf -X POST https://dns.purnomoadi.web.id/webhook/manual \
            -H "Authorization: Bearer ${WEBHOOK_SECRET}" \
            -H "Content-Type: application/json" \
            --max-time 15 || echo "Webhook tidak dapat dihubungi"
